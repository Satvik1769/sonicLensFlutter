name: sonic_lens_flutter
description: "SonicLens - Shazam + Spotify clone with Shizuku audio capture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio playback (Spotify-like)
  just_audio: ^0.9.41
  audio_service: ^0.18.15

  # HTTP & networking
  http: ^1.2.2

  # Storage & preferences
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3

  # Microphone recording (iOS mic capture + Android fallback)
  record: ^6.0.0

  # Permissions
  permission_handler: ^11.3.1

  # State management
  provider: ^6.1.2

  # Spotify
  spotify_sdk: ^3.0.0
  url_launcher: ^6.3.0

  # UI
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/